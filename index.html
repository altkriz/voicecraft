<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceCraft | AI Text-to-Speech Converter by Kriztech</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-gray-900">

    <!-- Loading Screen -->
    <div id="loader" class="fixed inset-0 flex items-center justify-center bg-gray-900 z-50">
        <div class="text-center">
            <div class="w-10 h-10 border-4 border-white border-t-transparent rounded-full animate-spin mx-auto"></div>
            <p class="text-white mt-3 text-sm">Loading...</p>
        </div>
    </div>

    <!-- Iframe -->
    <iframe 
        id="frame"
        src="https://kriztech.in/voicecraft" 
        class="w-full h-full border-0"
        allowfullscreen
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
    ></iframe>

    <script>
        const iframe = document.getElementById('frame');
        const loader = document.getElementById('loader');

        iframe.onload = () => {
            loader.style.display = 'none';
        };
    </script>

</body>
</html>
